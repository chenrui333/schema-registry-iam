name: Publish to GHCR

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  IMAGE_NAME: ghcr.io/chenrui333/schema-registry-iam

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Set up QEMU
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Verify CP_DIGEST matches CP_VERSION
        run: |
          set -euo pipefail
          version=$(grep '^ARG CP_VERSION=' Dockerfile | cut -d= -f2)
          pinned=$(grep '^ARG CP_DIGEST=' Dockerfile | cut -d= -f2)
          live=$(docker buildx imagetools inspect "confluentinc/cp-schema-registry:${version}" \
            | awk '/^Digest:/ { print $2; exit }')
          if [[ "${pinned}" != "${live}" ]]; then
            echo "CP_DIGEST mismatch — update CP_DIGEST in Dockerfile to ${live}"
            echo "  Dockerfile: ${pinned}"
            echo "  Registry:   ${live}"
            exit 1
          fi
          echo "CP_DIGEST verified: ${pinned}"

      # Build amd64 image and load it for testing.
      - name: Build image (amd64)
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          platforms: linux/amd64
          load: true
          tags: ${{ env.IMAGE_NAME }}:test-amd64

      - name: Validate image (amd64)
        run: ./scripts/test-image.sh --skip-build ${{ env.IMAGE_NAME }}:test-amd64

      # Build arm64 image under QEMU and load it for testing.
      - name: Build image (arm64)
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          platforms: linux/arm64
          load: true
          tags: ${{ env.IMAGE_NAME }}:test-arm64

      - name: Validate image (arm64)
        run: ./scripts/test-image.sh --skip-build ${{ env.IMAGE_NAME }}:test-arm64

      - name: Log in to GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        if: github.event_name == 'push'
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            # main branch -> latest
            type=raw,value=latest,enable={{is_default_branch}}
            # always: short SHA
            type=sha,prefix=

      # Push multi-arch manifest for main-branch publishes.
      - name: Build and push (multi-arch)
        if: github.event_name == 'push'
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
