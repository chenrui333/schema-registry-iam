name: Publish to GHCR

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  IMAGE_NAME: ghcr.io/chenrui333/schema-registry-iam

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Verify CP_DIGEST matches CP_VERSION
        run: |
          set -euo pipefail
          version=$(grep '^ARG CP_VERSION=' Dockerfile | cut -d= -f2)
          pinned=$(grep '^ARG CP_DIGEST=' Dockerfile | cut -d= -f2)
          live=$(docker buildx imagetools inspect "confluentinc/cp-schema-registry:${version}" \
            | awk '/^Digest:/ { print $2; exit }')
          if [[ "${pinned}" != "${live}" ]]; then
            echo "CP_DIGEST mismatch — update CP_DIGEST in Dockerfile to ${live}"
            echo "  Dockerfile: ${pinned}"
            echo "  Registry:   ${live}"
            exit 1
          fi
          echo "CP_DIGEST verified: ${pinned}"

      # Build amd64 image and load it for testing.
      - name: Build image (amd64)
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          platforms: linux/amd64
          load: true
          tags: ${{ env.IMAGE_NAME }}:test-amd64

      - name: Validate image (amd64)
        run: ./scripts/test-image.sh --skip-build ${{ env.IMAGE_NAME }}:test-amd64

      # Build arm64 image under QEMU and load it for testing.
      - name: Build image (arm64)
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          platforms: linux/arm64
          load: true
          tags: ${{ env.IMAGE_NAME }}:test-arm64

      - name: Validate image (arm64)
        run: ./scripts/test-image.sh --skip-build ${{ env.IMAGE_NAME }}:test-arm64

      - name: Log in to GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        if: github.event_name == 'push'
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            # main branch -> latest
            type=raw,value=latest,enable={{is_default_branch}}
            # always: short SHA
            type=sha,prefix=

      # Push multi-arch manifest for main-branch publishes.
      - name: Build and push (multi-arch)
        if: github.event_name == 'push'
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
