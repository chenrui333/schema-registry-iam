name: Release

on:
  push:
    tags: ["v*"]

env:
  IMAGE_NAME: ghcr.io/chenrui333/schema-registry-iam

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Set up QEMU
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Verify CP_DIGEST matches CP_VERSION
        run: |
          set -euo pipefail
          version=$(grep '^ARG CP_VERSION=' Dockerfile | cut -d= -f2)
          pinned=$(grep '^ARG CP_DIGEST=' Dockerfile | cut -d= -f2)
          live=$(docker buildx imagetools inspect "confluentinc/cp-schema-registry:${version}" \
            | awk '/^Digest:/ { print $2; exit }')
          if [[ "${pinned}" != "${live}" ]]; then
            echo "CP_DIGEST mismatch — update CP_DIGEST in Dockerfile to ${live}"
            echo "  Dockerfile: ${pinned}"
            echo "  Registry:   ${live}"
            exit 1
          fi
          echo "CP_DIGEST verified: ${pinned}"

      - name: Build image (amd64)
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          platforms: linux/amd64
          load: true
          tags: ${{ env.IMAGE_NAME }}:test-amd64

      - name: Validate image (amd64)
        run: ./scripts/test-image.sh --skip-build ${{ env.IMAGE_NAME }}:test-amd64

      - name: Build image (arm64)
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          platforms: linux/arm64
          load: true
          tags: ${{ env.IMAGE_NAME }}:test-arm64

      - name: Validate image (arm64)
        run: ./scripts/test-image.sh --skip-build ${{ env.IMAGE_NAME }}:test-arm64

      - name: Log in to GHCR
        uses: docker/login-action@c99871dec2022cc055c062a10cc1a1310835ceb4 # v4.3.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            # tag event: v7.9.6 -> 7.9.6
            type=semver,pattern={{version}}
            # tag event: v7.9.6 -> 7.9
            type=semver,pattern={{major}}.{{minor}}
            # tag releases also refresh latest
            type=raw,value=latest
            # always: short SHA
            type=sha,prefix=

      - name: Build and push (multi-arch)
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          version="${tag#v}"
          minor="${version%.*}"

          if gh release view "${tag}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            echo "GitHub release ${tag} already exists; skipping."
            exit 0
          fi

          notes_template=$(cat <<'EOF'
          ## Container image

          Pull this release from GHCR:

          ```bash
          docker pull __IMAGE__:__VERSION__
          ```

          Additional published tags for this release:

          ```bash
          docker pull __IMAGE__:__MINOR__
          docker pull __IMAGE__:latest
          ```
          EOF
          )
          notes="${notes_template//__IMAGE__/${IMAGE_NAME}}"
          notes="${notes//__VERSION__/${version}}"
          notes="${notes//__MINOR__/${minor}}"

          gh release create "${tag}" \
            --repo "${GITHUB_REPOSITORY}" \
            --verify-tag \
            --generate-notes \
            --latest \
            --notes "${notes}"
