name: Release

on:
  push:
    tags: ["v*"]

env:
  IMAGE_NAME: ghcr.io/chenrui333/schema-registry-iam

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up QEMU
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3.7.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0

      - name: Build image (amd64)
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
        with:
          context: .
          platforms: linux/amd64
          load: true
          tags: ${{ env.IMAGE_NAME }}:test-amd64

      - name: Validate image (amd64)
        run: ./scripts/test-image.sh --skip-build ${{ env.IMAGE_NAME }}:test-amd64

      - name: Build image (arm64)
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
        with:
          context: .
          platforms: linux/arm64
          load: true
          tags: ${{ env.IMAGE_NAME }}:test-arm64

      - name: Validate image (arm64)
        run: ./scripts/test-image.sh --skip-build ${{ env.IMAGE_NAME }}:test-arm64

      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5.10.0
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            # tag event: v7.9.6 -> 7.9.6
            type=semver,pattern={{version}}
            # tag event: v7.9.6 -> 7.9
            type=semver,pattern={{major}}.{{minor}}
            # tag releases also refresh latest
            type=raw,value=latest
            # always: short SHA
            type=sha,prefix=

      - name: Build and push (multi-arch)
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          version="${tag#v}"
          minor="${version%.*}"

          if gh release view "${tag}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            echo "GitHub release ${tag} already exists; skipping."
            exit 0
          fi

          notes_template=$(cat <<'EOF'
          ## Container image

          Pull this release from GHCR:

          ```bash
          docker pull __IMAGE__:__VERSION__
          ```

          Additional published tags for this release:

          ```bash
          docker pull __IMAGE__:__MINOR__
          docker pull __IMAGE__:latest
          ```
          EOF
          )
          notes="${notes_template//__IMAGE__/${IMAGE_NAME}}"
          notes="${notes//__VERSION__/${version}}"
          notes="${notes//__MINOR__/${minor}}"

          gh release create "${tag}" \
            --repo "${GITHUB_REPOSITORY}" \
            --verify-tag \
            --generate-notes \
            --latest \
            --notes "${notes}"
