name: Release

on:
  push:
    tags: ["v*"]

env:
  IMAGE_NAME: ghcr.io/chenrui333/schema-registry-iam

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Verify CP_DIGEST matches CP_VERSION
        run: |
          set -euo pipefail
          version=$(grep '^ARG CP_VERSION=' Dockerfile | cut -d= -f2)
          pinned=$(grep '^ARG CP_DIGEST=' Dockerfile | cut -d= -f2)
          live=$(docker buildx imagetools inspect "confluentinc/cp-schema-registry:${version}" \
            | awk '/^Digest:/ { print $2; exit }')
          if [[ "${pinned}" != "${live}" ]]; then
            echo "CP_DIGEST mismatch — update CP_DIGEST in Dockerfile to ${live}"
            echo "  Dockerfile: ${pinned}"
            echo "  Registry:   ${live}"
            exit 1
          fi
          echo "CP_DIGEST verified: ${pinned}"

      - name: Build image (amd64)
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          platforms: linux/amd64
          load: true
          tags: ${{ env.IMAGE_NAME }}:test-amd64

      - name: Validate image (amd64)
        run: ./scripts/test-image.sh --skip-build ${{ env.IMAGE_NAME }}:test-amd64

      - name: Build image (arm64)
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          platforms: linux/arm64
          load: true
          tags: ${{ env.IMAGE_NAME }}:test-arm64

      - name: Validate image (arm64)
        run: ./scripts/test-image.sh --skip-build ${{ env.IMAGE_NAME }}:test-arm64

      - name: Log in to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            # tag event: v7.9.6 -> 7.9.6
            type=semver,pattern={{version}}
            # tag event: v7.9.6 -> 7.9
            type=semver,pattern={{major}}.{{minor}}
            # tag releases also refresh latest
            type=raw,value=latest
            # always: short SHA
            type=sha,prefix=

      - name: Build and push (multi-arch)
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          version="${tag#v}"
          minor="${version%.*}"

          if gh release view "${tag}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            echo "GitHub release ${tag} already exists; skipping."
            exit 0
          fi

          notes_template=$(cat <<'EOF'
          ## Container image

          Pull this release from GHCR:

          ```bash
          docker pull __IMAGE__:__VERSION__
          ```

          Additional published tags for this release:

          ```bash
          docker pull __IMAGE__:__MINOR__
          docker pull __IMAGE__:latest
          ```
          EOF
          )
          notes="${notes_template//__IMAGE__/${IMAGE_NAME}}"
          notes="${notes//__VERSION__/${version}}"
          notes="${notes//__MINOR__/${minor}}"

          gh release create "${tag}" \
            --repo "${GITHUB_REPOSITORY}" \
            --verify-tag \
            --generate-notes \
            --latest \
            --notes "${notes}"
